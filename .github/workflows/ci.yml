name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v testdata)" || { gofmt -l .; exit 1; }
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with: { version: v1.64.8 }
      - name: unit tests
        run: go test ./...
      - name: install clangd (for integration)
        run: sudo apt-get update && sudo apt-get install -y clangd
      - name: integration tests
        run: go test -tags integration ./...
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with: { go-version: '1.23' }
      - name: cross-compile all platforms
        run: ./build-release.sh ci
