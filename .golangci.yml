run:
  timeout: 3m
linters:
  # errcheck is a v1 default; disable it — this codebase has many deliberate
  # fire-and-forget LSP/IPC writes and filepath.Walk callbacks. The remaining
  # defaults (govet, staticcheck, ineffassign, unused) plus gofmt/misspell stay.
  disable:
    - errcheck
  enable:
    - gofmt
    - misspell
