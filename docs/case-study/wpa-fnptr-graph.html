<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>wpa_supplicant: fn-pointer dispatch to wext_scan (ccq, no-build)</title>
<style>
  :root{--bg:#0d1117;--fg:#c9d1d9;--muted:#8b949e;--edge:#30363d;--fnptr:#d29922}
  *{box-sizing:border-box} html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);
    font:14px/1.4 -apple-system,Segoe UI,Roboto,sans-serif}
  header{padding:10px 16px;border-bottom:1px solid var(--edge)}
  header h1{margin:0;font-size:16px} header p{margin:4px 0 0;color:var(--muted);font-size:12px}
  .legend{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap;font-size:12px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:11px;height:11px;border-radius:50%;display:inline-block}
  svg{width:100vw;height:calc(100vh - 88px);cursor:grab;display:block}
  .link{stroke:var(--edge);stroke-width:1.2}
  .link.fnptr{stroke:var(--fnptr);stroke-dasharray:4 3;stroke-width:1.6}
  .node circle{stroke:#0d1117;stroke-width:1.5;cursor:pointer}
  .node text{fill:var(--fg);font-size:11px;pointer-events:none;paint-order:stroke;
    stroke:#0d1117;stroke-width:3px}
  .node.dim{opacity:.15} .link.dim{opacity:.06}
</style></head><body>
<header>
  <h1>wpa_supplicant: fn-pointer dispatch to wext_scan (ccq, no-build)</h1>
  <p>Generated from <code>ccq export</code> / <code>ccq explore</code> — drag nodes, hover to focus a neighborhood. Self-contained, offline.</p>
  <div class="legend">
    <span><i class="dot" style="background:#e3b341"></i>focus</span>
    <span><i class="dot" style="background:#58a6ff"></i>caller (calls focus)</span>
    <span><i class="dot" style="background:#3fb950"></i>callee (called by focus)</span>
    <span><i class="dot" style="background:#8b949e"></i>other</span>
    <span><i class="dot" style="background:#d29922"></i>— — fn-pointer edge</span>
  </div>
</header>
<svg id="g"></svg>
<script>
const DATA = {"focus": "wpa_driver_wext_scan", "nodes": [{"id": "wpa_driver_wext_scan", "kind": "focus", "role": "focus"}, {"id": "wpa_driver_wext_ops", "kind": "function", "role": "caller"}, {"id": "hostapd_driver_scan", "kind": "function", "role": "caller"}, {"id": "wpa_drv_scan", "kind": "function", "role": "caller"}, {"id": "wpa_priv_cmd_scan", "kind": "function", "role": "caller"}], "edges": [{"src": "wpa_driver_wext_ops", "dst": "wpa_driver_wext_scan", "kind": "register"}, {"src": "hostapd_driver_scan", "dst": "wpa_driver_wext_scan", "kind": "fnptr"}, {"src": "wpa_drv_scan", "dst": "wpa_driver_wext_scan", "kind": "fnptr"}, {"src": "wpa_priv_cmd_scan", "dst": "wpa_driver_wext_scan", "kind": "fnptr"}]};
const COLOR = {focus:"#e3b341",caller:"#58a6ff",callee:"#3fb950",other:"#8b949e"};
const svg = document.getElementById("g");
let W = svg.clientWidth, H = svg.clientHeight;
const SVGNS = "http://www.w3.org/2000/svg";
// arrowhead
svg.innerHTML = '<defs><marker id="arr" viewBox="0 0 10 10" refX="18" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#484f58"/></marker></defs>';

const idx = new Map(DATA.nodes.map((n,i)=>[n.id,n]));
DATA.nodes.forEach(n=>{ n.x=W/2+(Math.random()-.5)*300; n.y=H/2+(Math.random()-.5)*300; n.vx=0; n.vy=0; });
const links = DATA.edges.filter(e=>idx.has(e.src)&&idx.has(e.dst)).map(e=>({s:idx.get(e.src),t:idx.get(e.dst),kind:e.kind}));
const deg = new Map(); DATA.nodes.forEach(n=>deg.set(n.id,0));
links.forEach(l=>{deg.set(l.s.id,deg.get(l.s.id)+1);deg.set(l.t.id,deg.get(l.t.id)+1);});

// render layer
const gLink = document.createElementNS(SVGNS,"g"); svg.appendChild(gLink);
const gNode = document.createElementNS(SVGNS,"g"); svg.appendChild(gNode);
const lineEls = links.map(l=>{const e=document.createElementNS(SVGNS,"line");
  e.setAttribute("class","link"+(l.kind==="fnptr"?" fnptr":"")); e.setAttribute("marker-end","url(#arr)"); gLink.appendChild(e); return e;});
const nodeEls = DATA.nodes.map(n=>{
  const g=document.createElementNS(SVGNS,"g"); g.setAttribute("class","node");
  const c=document.createElementNS(SVGNS,"circle"); const r=(n.role==="focus")?13:(6+Math.min(8,deg.get(n.id)));
  c.setAttribute("r",r); c.setAttribute("fill",COLOR[n.role]||COLOR.other);
  const t=document.createElementNS(SVGNS,"text"); t.setAttribute("x",r+3); t.setAttribute("y",4); t.textContent=n.id;
  g.appendChild(c); g.appendChild(t); gNode.appendChild(g);
  g._n=n; g._c=c; addDrag(g,n); addHover(g,n);
  return g;
});

// force sim
function tick(){
  for(let i=0;i<DATA.nodes.length;i++)for(let j=i+1;j<DATA.nodes.length;j++){
    const a=DATA.nodes[i],b=DATA.nodes[j]; let dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy||1;
    let f=11000/d2; let d=Math.sqrt(d2); dx/=d;dy/=d; a.vx+=dx*f;a.vy+=dy*f;b.vx-=dx*f;b.vy-=dy*f;}
  links.forEach(l=>{let dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)||1,f=(d-120)*0.015;
    dx/=d;dy/=d; l.s.vx+=dx*f;l.s.vy+=dy*f; l.t.vx-=dx*f;l.t.vy-=dy*f;});
  DATA.nodes.forEach(n=>{ n.vx+=(W/2-n.x)*0.0012; n.vy+=(H/2-n.y)*0.0012;
    if(n._fix){n.x=n._fx;n.y=n._fy;} else {n.x+=n.vx*=.85; n.y+=n.vy*=.85;} });
  lineEls.forEach((e,i)=>{const l=links[i]; e.setAttribute("x1",l.s.x);e.setAttribute("y1",l.s.y);
    e.setAttribute("x2",l.t.x);e.setAttribute("y2",l.t.y);});
  nodeEls.forEach(g=>g.setAttribute("transform",`translate(${g._n.x},${g._n.y})`));
  requestAnimationFrame(tick);
}
tick();

function addDrag(g,n){ g.addEventListener("mousedown",e=>{n._fix=true;
  const mv=ev=>{const p=pt(ev);n._fx=p.x;n._fy=p.y;}; const up=()=>{n._fix=false;
    document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
  document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up); e.preventDefault();});}
function pt(ev){const r=svg.getBoundingClientRect();return {x:ev.clientX-r.left,y:ev.clientY-r.top};}
function addHover(g,n){ g.addEventListener("mouseenter",()=>{
  const keep=new Set([n.id]); links.forEach(l=>{if(l.s.id===n.id)keep.add(l.t.id);if(l.t.id===n.id)keep.add(l.s.id);});
  nodeEls.forEach(e=>e.classList.toggle("dim",!keep.has(e._n.id)));
  lineEls.forEach((e,i)=>e.classList.toggle("dim",links[i].s.id!==n.id&&links[i].t.id!==n.id));});
  g.addEventListener("mouseleave",()=>{nodeEls.forEach(e=>e.classList.remove("dim"));lineEls.forEach(e=>e.classList.remove("dim"));});}
window.addEventListener("resize",()=>{W=svg.clientWidth;H=svg.clientHeight;});
</script></body></html>
